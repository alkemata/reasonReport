# docker-compose.yml
version: '3'

services:

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - ./mongo-config:/etc/mongo-config
      - mongo-data:/data/db
      - ./mongo-logs:/var/log/mongodb:rw
    command: mongod --config /etc/mongo-config/mongod.conf
    networks:
      - default
    
  flaskapprr:
    build: .
    volumes:
      - ./app:/app/
    labels:
      traefik.enable: true
      traefik.docker.network: traefik_web
      traefik.http.routers.flaskapprr.entrypoints: websecure
      traefik.http.routers.flaskapprr.rule: 'Host(`rr.alkemata.com`)'
      traefik.http.services.flaskapprr.loadbalancer.server.port: 5000
    networks:
      - traefik_web
      - default
    depends_on:
      - mongo
    environment:
      - PYTHONUNBUFFERED=1
      - MONGO_URI=mongodb://mongo:27017/flaskdb
      - JUPYTERLITE_PATH=/opt/jupyterlite
      - SECRET_KEY=${SECRET_KEY:-development-flask-key-change-me-32}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-development-jwt-key-change-me-32}
      - JWT_COOKIE_SECURE=${JWT_COOKIE_SECURE:-true}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - INDEX_PAGE_NAME=${INDEX_PAGE_NAME:-mainpage}


networks:
  traefik_web:
    external: true

volumes:
  mongo-data:
    driver: local
