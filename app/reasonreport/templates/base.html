<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ title if title else "Flask App" }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
            
            <div id="auth-buttons">

                {% if is_authenticated %}
                <span id="welcome-message">{{ username }}</span>
                {% endif %}
                {% if is_author %}
                <a class="nav-button" id="edit-button" href="{{ url_for('edit_notebook', identifier=id) }}">Edit Notebook</a>
                {% else %}
                <span id="edit-button" hidden></span>
                {% endif %}
                
                {% if is_authenticated %}
                <!-- Create button with dropdown -->
                <div class="dropdown">
                    <button id="create-button">Create Notebook</button>
                    <div class="dropdown-content">
                        <a href="{{ url_for('create_fromtemplate', slugid='blank') }}">Blank</a>
                        <a href="{{ url_for('create_fromtemplate', slugid='article') }}">Article</a>
                        <a href="{{ url_for('create_fromtemplate', slugid='group') }}">Group</a>
                        <!-- Add more options as needed -->
                    </div>
                </div>

                <a class="nav-button" id="logout-button" href="{{ url_for('logout') }}">Logout</a>
                {% else %}
                <a class="nav-button" id="login-button" href="{{ url_for('login', next=request.path) }}">Login</a>
                <a class="nav-button" id="register-button" href="{{ url_for('register') }}">Register</a>
                {% endif %}
            </div>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
